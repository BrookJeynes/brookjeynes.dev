<!DOCTYPE html>
<html>
  <head id="head">
    <meta charset="UTF-8">
    <meta name="description" content="a collection of writings from me about varying topics i find interesting">
    <meta property="og:title" content="$page.title">
    <meta property="og:type" content="website">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="alternate" type="application/rss+xml" href="/writings/rss.xml">
    <title id="title">
      <ctx :text="$page.title"></ctx> - <ctx :text="$site.title"></ctx>
    </title>
    <link rel="stylesheet" type="text/css" href="$site.asset('style.css').link()">
    <link rel="stylesheet" type="text/css" href="$site.asset('highlight.css').link()">
  </head>
  <body>
    <div class="container">
    <header id="banner">
      <h2>
        <a href="$site.link()">brookjeynes.dev</a>
      </h2>
      <nav>
        <ul>
          <li><a class="$page.link().contains('/writings/').then('selected', '')" href="$site.page('writings').link()" :text="$i18n.getOr('writings', 'writings')"></a></li>
          <li><a class="$page.link().contains('/videos/').then('selected', '')" href="$site.page('videos').link()" :text="$i18n.getOr('videos', 'videos')"></a></li>
          <li><a class="$page.link().contains('/library/').then('selected', '')" href="$site.page('library').link()" :text="$i18n.getOr('library', 'library')"></a></li>
        </ul>
      </nav>
    </header>

    <main id="content">
      <super>
    </main>

    <footer>
        <div align="center">
            <small>
                Have comments? Reach out to <a href="mailto:me@brookjeynes.dev" target="_blank">me@brookjeynes.dev</a> <br>
                <a href="/writings/rss.xml">Subscribe to my RSS feed</a>.
            </small>
        </div>
    </footer>
    </div>
  </body>
</html>
